name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/rlstech/dashfinance-backend:latest

      - name: Build e push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/rlstech/dashfinance-frontend:latest

      - name: Redeploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/rlstech/dashfinance-backend:latest
            docker pull ghcr.io/rlstech/dashfinance-frontend:latest
            docker service update --image ghcr.io/rlstech/dashfinance-backend:latest --with-registry-auth --force uaudash_backend
            docker service update --image ghcr.io/rlstech/dashfinance-frontend:latest --with-registry-auth --force uaudash_frontend
            for i in 1 2 3 4 5; do
              sleep 15
              if curl -sf --max-time 120 https://dash.railton.eu.org/api/sync > /dev/null 2>&1; then
                echo "Sync completed successfully"
                break
              fi
              echo "Sync attempt $i failed, retrying..."
            done
