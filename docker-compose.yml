version: "3.8"

services:
  app:
    image: ghcr.io/rlstech/dashfinance:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.uaudash.rule=Host(`dash.railton.eu.org`)"
        - "traefik.http.routers.uaudash.entrypoints=websecure"
        - "traefik.http.routers.uaudash.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.uaudash.loadbalancer.server.port=5000"
    environment:
      - DB_SERVER=cloudflared
      - DB_PORT=62311
      - DB_NAME=uau
      - DB_USER=claude_readonly
      - DB_PASS=ClaudeReadOnly2024!
      - CACHE_FILE=/cache/cache.json
    volumes:
      - dashfinance_cache:/cache
    networks:
      - network_public
      - network_internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: access tcp --hostname sql.railton.eu.org --url 0.0.0.0:62311
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - network_internal

volumes:
  dashfinance_cache:

networks:
  network_public:
    external: true
  network_internal:
    driver: overlay
