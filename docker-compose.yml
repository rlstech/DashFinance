version: "3.8"

services:
  backend:
    image: ghcr.io/rlstech/dashfinance-backend:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.uaudash-api.rule=Host(`dash.railton.eu.org`) && PathPrefix(`/api`)"
        - "traefik.http.routers.uaudash-api.entrypoints=websecure"
        - "traefik.http.routers.uaudash-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.uaudash-api.loadbalancer.server.port=8000"
    environment:
      - DB_HOST=192.168.1.8
      - DB_PORT=62311
      - DB_NAME=uau
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - TZ=America/Sao_Paulo
      - CORS_ORIGINS=["https://dash.railton.eu.org","http://localhost:5173"]
    networks:
      - network_public
      - dashfinance_internal
    depends_on:
      - redis

  frontend:
    image: ghcr.io/rlstech/dashfinance-frontend:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.uaudash.rule=Host(`dash.railton.eu.org`)"
        - "traefik.http.routers.uaudash.entrypoints=websecure"
        - "traefik.http.routers.uaudash.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.uaudash.loadbalancer.server.port=80"
    networks:
      - network_public
      - dashfinance_internal

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - dashfinance_redis:/data
    networks:
      - dashfinance_internal
    command: redis-server --appendonly yes

volumes:
  dashfinance_redis:

networks:
  network_public:
    external: true
  dashfinance_internal:
    driver: overlay
